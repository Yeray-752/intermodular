name: deploy

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          host: ${{ secrets.IP }}
          port: 2222
          username: negro
          key: ${{ secrets.PRIVATE_KEY }}
          script: |
            cd /var/www/html/intermodular;
            git fetch --all;
            git reset --hard origin/master;
            git clean -df -e .env;
            cd frontend;
            npm install;
            npm run build;
            cd ..;
            pm2 restart api-intermodular;
